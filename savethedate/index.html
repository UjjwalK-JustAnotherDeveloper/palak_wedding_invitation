<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <title>Save the Date | Palak and Shubham</title>
  <link rel="shortcut icon" href="../assets/images/favicon.ico" type="image/x-icon">
  <style>
    @font-face {
      font-family: "Arsenica";
      src: url("../assets/fonts/ArsenicaTrial-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Arsenica";
      src: url("../assets/fonts/ArsenicaTrial-Medium.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "PTSerif";
      src: url("../assets/fonts/PTSerif-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "PTSerif";
      src: url("../assets/fonts/PTSerif-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "PTSerif";
      src: url("../assets/fonts/PTSerif-Italic.ttf") format("truetype");
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: "GoodVibrationsScript";
      src: url("../assets/fonts/GoodVibrations-Script.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light;
      --ruby: #66021f;
      --ruby-deep: #3d0112;
      --ruby-glow: #8a1231;
      --ivory: #fffaf8;
      --cream: #f7eadf;
      --blush: #f2c8cc;
      --rose: #d88791;
      --ink: #31000d;
      --gold: #cba15a;
      --shadow: rgba(36, 0, 10, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--ruby);
    }

    html {
      scrollbar-gutter: stable;
    }

    body {
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 14%, rgba(255, 250, 248, 0.2), rgba(255, 250, 248, 0) 36%),
        linear-gradient(90deg, #4f0518 0%, var(--ruby) 12%, var(--ruby) 88%, #4f0518 100%);
      color: var(--ivory);
      font-family: "PTSerif", Georgia, serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .std-page {
      position: relative;
      display: grid;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--ruby);
      isolation: isolate;
      overflow-x: hidden;
      overflow-y: auto;
      opacity: 1;
      padding: clamp(24px, 4vw, 46px) clamp(18px, 5vw, 72px) clamp(22px, 3.5vw, 40px);
      transform: translateZ(0);
      transition: opacity 780ms ease, filter 900ms ease, transform 900ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    body.std-intro-active {
      overflow: hidden;
    }

    body.std-intro-active .std-page {
      opacity: 1;
      filter: none;
      pointer-events: none;
      transform: translateZ(0);
    }

    body.std-intro-revealing .std-page {
      opacity: 1;
      filter: blur(0);
      pointer-events: auto;
      transform: translateZ(0);
    }

    body.std-intro-active .std-content {
      opacity: 1;
      transform: translateY(clamp(-48px, -5vh, -26px));
      transition: opacity 480ms ease, transform 620ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    body.std-page-ready .std-content {
      opacity: 1;
      transform: translateY(clamp(-48px, -5vh, -26px));
      transition-delay: 120ms;
    }

    body.std-intro-active .std-content > :not(.std-home) {
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      visibility: hidden;
      transition: opacity 480ms ease, transform 620ms cubic-bezier(0.16, 1, 0.3, 1), visibility 0s linear 480ms;
    }

    body.std-page-ready .std-content > :not(.std-home) {
      opacity: 1;
      transform: translateY(0);
      visibility: visible;
      transition-delay: 120ms, 120ms, 0s;
    }

    .std-photo {
      position: absolute;
      inset: 0;
      z-index: -3;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 32%;
      opacity: 0.2;
      filter: sepia(0.18) saturate(0.78) contrast(0.96);
      transform: scale(1.04);
    }

    .std-page::before,
    .std-page::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .std-page::before {
      z-index: -2;
      background:
        linear-gradient(180deg, rgba(61, 1, 18, 0.72) 0%, rgba(102, 2, 31, 0.42) 42%, rgba(61, 1, 18, 0.84) 100%),
        radial-gradient(circle at 50% 58%, rgba(255, 250, 248, 0.18), rgba(255, 250, 248, 0) 46%);
    }

    .std-page::after {
      z-index: -1;
      box-shadow: inset 0 0 92px rgba(28, 0, 8, 0.44);
    }

    .std-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1080px;
      min-height: calc(100vh - clamp(48px, 8vw, 92px));
      min-height: calc(100dvh - clamp(48px, 8vw, 92px));
      margin: 0 auto;
    }

    .std-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: clamp(62px, 9vw, 92px);
      padding: 0 clamp(24px, 4vw, 42px);
      border: 1px solid rgba(255, 250, 248, 0.28);
      border-radius: 999px;
      color: rgba(255, 250, 248, 0.9);
      font-family: "GoodVibrationsScript", cursive;
      font-size: clamp(44px, 8vw, 80px);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: 0;
      text-decoration: none;
      text-transform: none;
      text-shadow: 0 12px 28px var(--shadow);
      transition: border-color 180ms ease, background-color 180ms ease, color 180ms ease;
    }

    .std-home--badge {
      pointer-events: none;
    }

    .std-content {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: clamp(16px, 2.4vw, 32px);
      flex: 1 1 auto;
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: clamp(18px, 4vw, 44px) 0 clamp(18px, 3vw, 34px);
      text-align: center;
      transform: translateY(clamp(-48px, -5vh, -26px));
    }

    .std-names {
      display: grid;
      justify-items: center;
      gap: clamp(4px, 0.95vw, 12px);
      margin: 0;
      color: var(--ivory);
      font-family: "Arsenica", Georgia, serif;
      font-size: clamp(50px, 8vw, 94px);
      font-weight: 500;
      line-height: 0.9;
      letter-spacing: 0;
      text-shadow: 0 16px 34px rgba(36, 0, 10, 0.36);
      text-wrap: balance;
    }

    .std-name-line {
      display: block;
    }

    .std-typewriter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 8ch;
      min-height: clamp(28px, 3.8vw, 46px);
      color: #d9b764;
      font-family: "PTSerif", Georgia, serif;
      font-size: clamp(26px, 3.2vw, 40px);
      font-style: italic;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 10px 22px rgba(36, 0, 10, 0.3);
    }

    .std-typewriter-text {
      display: inline-block;
      text-align: center;
    }

    .std-typewriter-cursor {
      display: inline-block;
      margin-left: 3px;
      color: rgba(217, 183, 100, 0.9);
      font-family: "PTSerif", Georgia, serif;
      font-size: 0.82em;
      line-height: 1;
      transform: translateY(0.08em);
      animation: stdCursorBlink 1000ms steps(1) infinite;
    }

    @keyframes stdCursorBlink {
      50% {
        opacity: 0;
      }
    }

    .std-date-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 1.6vw, 22px);
      width: min(100%, 640px);
      margin-top: clamp(2px, 0.55vw, 8px);
    }

    .std-date-wrap::before,
    .std-date-wrap::after {
      content: "";
      display: block;
      flex: 1 1 clamp(28px, 7vw, 96px);
      min-width: 24px;
      max-width: 112px;
      height: 1px;
      background: linear-gradient(90deg, rgba(255, 250, 248, 0), rgba(255, 250, 248, 0.54));
      box-shadow: 0 1px 10px rgba(255, 250, 248, 0.08);
    }

    .std-date-wrap::after {
      background: linear-gradient(90deg, rgba(255, 250, 248, 0.54), rgba(255, 250, 248, 0));
    }

    .std-date {
      margin: 0;
      color: var(--ivory);
      font-family: "PTSerif", Georgia, serif;
      font-size: clamp(50px, 6.6vw, 84px);
      font-weight: 700;
      line-height: 0.98;
      letter-spacing: 0.02em;
      font-variant-numeric: lining-nums tabular-nums;
      white-space: nowrap;
      text-shadow: 0 16px 34px rgba(36, 0, 10, 0.34);
    }

    .std-countdown {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: clamp(5px, 1vw, 10px);
      width: min(100%, 480px);
      margin-top: clamp(0px, 0.45vw, 6px);
      opacity: 0.78;
    }

    .std-time-block {
      display: grid;
      justify-items: center;
      min-width: 0;
      width: clamp(54px, 7vw, 74px);
    }

    .std-number {
      color: var(--ivory);
      font-family: "PTSerif", Georgia, serif;
      font-size: clamp(20px, 2.25vw, 27px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      font-variant-numeric: lining-nums tabular-nums;
    }

    .std-label {
      margin-top: 5px;
      color: rgba(255, 250, 248, 0.58);
      font-family: "PTSerif", Georgia, serif;
      font-size: clamp(10px, 1.2vw, 12px);
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .std-separator {
      display: inline-block;
      margin-top: -2px;
      color: rgba(255, 250, 248, 0.36);
      font-family: "PTSerif", Georgia, serif;
      font-size: clamp(20px, 2.25vw, 27px);
      line-height: 1;
      font-variant-numeric: lining-nums tabular-nums;
    }

    .std-intro {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: clamp(22px, 5vw, 58px);
      background: transparent;
      cursor: default;
      transition: opacity 640ms ease, visibility 640ms ease;
    }

    .std-intro::before,
    .std-intro::after {
      content: "";
      position: absolute;
      inset: clamp(16px, 3vw, 34px);
      pointer-events: none;
    }

    .std-intro::before {
      inset: 0;
      background:
        radial-gradient(circle at 50% 40%, rgba(255, 250, 248, 0.18), rgba(255, 250, 248, 0) 38%),
        radial-gradient(circle at 50% 68%, rgba(203, 161, 90, 0.16), rgba(203, 161, 90, 0) 34%),
        linear-gradient(135deg, #3d0112 0%, #66021f 44%, #4b0317 100%);
      opacity: 1;
      transition: opacity 620ms ease;
    }

    .std-intro::after {
      border: 1px solid rgba(255, 250, 248, 0.18);
      box-shadow: inset 0 0 74px rgba(36, 0, 10, 0.24);
    }

    .std-intro-inner {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      width: min(100%, 680px);
      text-align: center;
      transition: opacity 260ms ease;
    }

    .std-intro-lottie {
      width: clamp(305px, 58vmin, 580px);
      max-width: 100%;
      aspect-ratio: 1;
      filter: drop-shadow(0 22px 34px rgba(36, 0, 10, 0.3));
      transform: translateZ(0);
      transition: filter 360ms ease, opacity 360ms ease, transform 520ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .std-intro-title {
      margin: clamp(-18px, -2vw, -6px) 0 0;
      color: rgba(255, 250, 248, 0.92);
      font-family: "GoodVibrationsScript", cursive;
      font-size: clamp(50px, 9vw, 92px);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: 0;
      text-shadow: 0 16px 32px rgba(36, 0, 10, 0.28);
      transition: opacity 220ms ease, transform 280ms ease;
    }

    .std-intro-button {
      min-height: 44px;
      margin-top: clamp(18px, 3vw, 28px);
      padding: 0 22px;
      border: 1px solid rgba(255, 250, 248, 0.34);
      border-radius: 999px;
      background: rgba(255, 250, 248, 0.12);
      color: var(--ivory);
      cursor: pointer;
      font-family: "PTSerif", Georgia, serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      text-transform: uppercase;
      transform: translateY(8px);
      transition: opacity 240ms ease, transform 240ms ease, background-color 180ms ease, border-color 180ms ease;
    }

    .std-intro-button:hover,
    .std-intro-button:focus-visible {
      border-color: rgba(203, 161, 90, 0.82);
      background: rgba(203, 161, 90, 0.16);
      outline: none;
    }

    .std-intro-button:disabled {
      cursor: default;
    }

    body.std-intro-ready .std-intro-button {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .std-intro.std-intro--revealing {
      cursor: default;
      pointer-events: none;
    }

    .std-intro.std-intro--revealing::before {
      opacity: 0.52;
    }

    .std-intro.std-intro--revealing .std-intro-title,
    .std-intro.std-intro--revealing .std-intro-button {
      opacity: 0;
      transform: translateY(6px);
      visibility: hidden;
    }

    .std-intro.std-intro--revealing .std-intro-lottie {
      filter: drop-shadow(0 14px 24px rgba(36, 0, 10, 0.24));
      transform: scale(0.985);
    }

    .std-intro.std-intro--exiting {
      opacity: 0;
      visibility: hidden;
    }

    .std-intro.std-intro--exiting::before {
      opacity: 0;
    }

    .std-intro.std-intro--exiting .std-intro-lottie {
      opacity: 0;
      transform: scale(0.96);
    }

    @media (max-width: 720px) {
      .std-page {
        min-height: max(100vh, 720px);
        min-height: max(100dvh, 720px);
        padding: 18px 16px 18px;
      }

      .std-photo {
        object-position: 56% center;
        opacity: 0.24;
        transform: scale(1.03);
      }

      .std-page::before {
        background:
          linear-gradient(180deg, rgba(61, 1, 18, 0.78) 0%, rgba(102, 2, 31, 0.5) 36%, rgba(102, 2, 31, 0.64) 58%, rgba(61, 1, 18, 0.92) 100%),
          radial-gradient(ellipse at 50% 70%, rgba(255, 250, 248, 0.16), rgba(255, 250, 248, 0) 46%);
      }

      .std-home {
        display: block;
        justify-self: stretch;
        width: 100%;
        max-width: none;
        min-height: 0;
        padding: 0;
        border: 0;
        margin-top: clamp(100px, 15vh, 126px);
        font-size: clamp(42px, 11vw, 50px);
        line-height: 1;
        text-align: center;
        white-space: nowrap;
      }

      .std-home::after {
        content: "";
        display: block;
        width: clamp(76px, 22vw, 104px);
        height: 1px;
        margin: 10px auto 0;
        background: linear-gradient(90deg, rgba(203, 161, 90, 0), rgba(203, 161, 90, 0.82) 48%, rgba(255, 250, 248, 0.78) 50%, rgba(203, 161, 90, 0.82) 52%, rgba(203, 161, 90, 0));
        box-shadow: 0 1px 10px rgba(203, 161, 90, 0.18);
      }

      .std-shell {
        min-height: calc(100vh - 36px);
        min-height: calc(100dvh - 36px);
        min-height: calc(max(100dvh, 720px) - 36px);
        max-width: 360px;
      }

      .std-content {
        flex: 0 0 auto;
        align-content: start;
        gap: 14px;
        min-height: calc(100vh - 36px);
        min-height: calc(100dvh - 36px);
        min-height: calc(max(100dvh, 720px) - 36px);
        max-width: 340px;
        padding: 0 0 clamp(18px, 4vh, 32px);
        transform: none;
      }

      body.std-intro-active .std-content {
        opacity: 1;
        transform: none;
      }

      body.std-page-ready .std-content {
        opacity: 1;
        transform: none;
      }

      .std-names {
        gap: 4px;
        margin-top: clamp(150px, 19vh, 170px);
        font-size: clamp(48px, 12.4vw, 56px);
        line-height: 0.92;
      }

      .std-typewriter {
        min-height: 30px;
        font-size: clamp(24px, 6.8vw, 29px);
      }

      .std-date-wrap {
        gap: 8px;
        max-width: 340px;
        margin-top: 3px;
      }

      .std-date-wrap::before,
      .std-date-wrap::after {
        flex-basis: clamp(14px, 5vw, 22px);
        min-width: 12px;
      }

      .std-date {
        font-size: clamp(38px, 10.3vw, 46px);
        letter-spacing: 0.015em;
      }

      .std-countdown {
        gap: 3px;
        max-width: 318px;
        margin-top: 2px;
      }

      .std-number {
        font-size: 18px;
      }

      .std-label {
        margin-top: 4px;
        font-size: 9px;
        letter-spacing: 0.06em;
      }

      .std-time-block {
        width: 56px;
      }

      .std-separator {
        font-size: 18px;
      }
    }

    @media (max-width: 720px) and (max-height: 720px) {
      .std-page {
        min-height: 100vh;
        min-height: 100dvh;
      }

      .std-shell,
      .std-content {
        min-height: calc(100vh - 36px);
        min-height: calc(100dvh - 36px);
      }

      .std-content {
        gap: 12px;
        padding-bottom: 14px;
      }

      .std-home {
        margin-top: 88px;
        font-size: 40px;
      }

      .std-names {
        margin-top: 132px;
        font-size: 46px;
      }

      .std-typewriter {
        min-height: 28px;
        font-size: 24px;
      }

      .std-date {
        font-size: 40px;
      }
    }

    @media (max-width: 380px) {
      .std-photo {
        object-position: 50% center;
      }

      .std-names {
        font-size: 46px;
      }

      .std-countdown {
        gap: 2px;
        max-width: 300px;
      }

      .std-time-block {
        width: 52px;
      }

      .std-label {
        font-size: 8px;
        letter-spacing: 0.04em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body.std-intro-active {
        overflow: auto;
      }

      body.std-intro-active .std-page {
        opacity: 1;
        filter: none;
        transform: none;
      }

      body.std-intro-active .std-content,
      body.std-page-ready .std-content {
        opacity: 1;
        transform: none;
      }

      .std-intro {
        display: none;
      }

      .std-typewriter-cursor {
        animation: none;
        opacity: 0;
      }
    }
  </style>
  <noscript>
    <style>
      .std-intro {
        display: none;
      }

      body.std-intro-active {
        overflow: auto;
      }

      body.std-intro-active .std-page {
        opacity: 1;
        filter: none;
        transform: none;
      }

      body.std-intro-active .std-content,
      body.std-page-ready .std-content {
        opacity: 1;
        transform: none;
      }
    </style>
  </noscript>
</head>
<body class="std-intro-active">
  <div class="std-intro" id="std-intro">
    <div class="std-intro-inner">
      <div class="std-intro-lottie" id="std-couple-walk" aria-hidden="true"></div>
      <p class="std-intro-title">Palak &amp; Shubham</p>
      <button class="std-intro-button" id="std-intro-button" type="button" disabled>Reveal the Date</button>
    </div>
  </div>
  <main class="std-page">
    <img class="std-photo" src="../assets/images/e8174740-094c-4a9c-a832-f90406e5a4b1.jpg" alt="Palak and Shubham together" loading="eager" decoding="async">
    <div class="std-shell">
      <section class="std-content" aria-labelledby="save-the-date-title">
        <span class="std-home std-home--badge">Save the Date</span>
        <h1 class="std-names" id="save-the-date-title" aria-label="Palak marries Shubham">
          <span class="std-name-line" aria-hidden="true">Palak</span>
          <span class="std-typewriter" aria-hidden="true">
            <span class="std-typewriter-text" id="std-typewriter-text">marries</span>
            <span class="std-typewriter-cursor">_</span>
          </span>
          <span class="std-name-line" aria-hidden="true">Shubham</span>
        </h1>
        <div class="std-date-wrap" aria-label="Wedding date">
          <p class="std-date">20.11.2026</p>
        </div>

        <div class="std-countdown" aria-label="Countdown to the wedding">
          <div class="std-time-block">
            <div class="std-number" id="std-days">00</div>
            <div class="std-label">Days</div>
          </div>
          <span class="std-separator" aria-hidden="true">:</span>
          <div class="std-time-block">
            <div class="std-number" id="std-hours">00</div>
            <div class="std-label">Hours</div>
          </div>
          <span class="std-separator" aria-hidden="true">:</span>
          <div class="std-time-block">
            <div class="std-number" id="std-minutes">00</div>
            <div class="std-label">Minutes</div>
          </div>
          <span class="std-separator" aria-hidden="true">:</span>
          <div class="std-time-block">
            <div class="std-number" id="std-seconds">00</div>
            <div class="std-label">Seconds</div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="../assets/vendor/lottie.min.js"></script>
  <script>
    (function() {
      var intro = document.getElementById("std-intro");
      var lottieContainer = document.getElementById("std-couple-walk");
      var button = document.getElementById("std-intro-button");
      var prefersReducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var firstSegment = [0, 159];
      var exitSegment = [159, 239];
      var phase = "loading";
      var revealStarted = false;
      var pageIsLoaded = document.readyState === "complete";
      var lottieIsReady = false;
      var introHasStarted = false;
      var firstSegmentTimer;
      var fallbackTimer;
      var animation;

      if (!intro || !lottieContainer || prefersReducedMotion) {
        revealPage();
        return;
      }

      function revealPage() {
        document.body.classList.remove("std-intro-active", "std-intro-ready", "std-intro-revealing", "std-page-ready");
        if (intro) {
          intro.remove();
        }
      }

      function finishReveal() {
        window.clearTimeout(fallbackTimer);
        intro.classList.add("std-intro--exiting");
        document.body.classList.add("std-intro-revealing", "std-page-ready");
        window.setTimeout(revealPage, 680);
      }

      function holdIntro() {
        if (revealStarted || phase === "hold") return;

        window.clearTimeout(firstSegmentTimer);
        phase = "hold";

        if (animation && typeof animation.goToAndStop === "function") {
          animation.goToAndStop(firstSegment[1], true);
        }

        document.body.classList.add("std-intro-ready");
        if (button) {
          button.disabled = false;
        }
      }

      function startIntroWhenReady() {
        if (!pageIsLoaded || !lottieIsReady || introHasStarted || revealStarted) return;

        introHasStarted = true;
        phase = "intro";

        if (animation && typeof animation.goToAndStop === "function") {
          animation.goToAndStop(firstSegment[0], true);
        }

        window.requestAnimationFrame(function() {
          if (revealStarted || phase !== "intro") return;

          animation.playSegments(firstSegment, true);
          firstSegmentTimer = window.setTimeout(holdIntro, 5300);
        });
      }

      function markPageLoaded() {
        pageIsLoaded = true;
        startIntroWhenReady();
      }

      function beginReveal() {
        if (revealStarted) return;
        revealStarted = true;
        window.clearTimeout(firstSegmentTimer);
        phase = "exit";
        intro.classList.add("std-intro--revealing");
        document.body.classList.remove("std-intro-ready");
        if (button) {
          button.disabled = true;
        }

        if (animation && typeof animation.playSegments === "function") {
          animation.playSegments(exitSegment, true);
          fallbackTimer = window.setTimeout(finishReveal, 3600);
          return;
        }

        finishReveal();
      }

      function requestReveal(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }

        if (phase !== "hold" || (button && button.disabled)) return;

        beginReveal();
        document.dispatchEvent(new CustomEvent("std:reveal-date"));
      }

      if (button) {
        button.addEventListener("click", requestReveal);
      }

      if (!window.lottie || typeof window.lottie.loadAnimation !== "function") {
        revealPage();
        return;
      }

      animation = window.lottie.loadAnimation({
        container: lottieContainer,
        renderer: "svg",
        loop: false,
        autoplay: false,
        path: "../assets/lottie/couple-walk-intro.json",
        rendererSettings: {
          preserveAspectRatio: "xMidYMid meet",
          progressiveLoad: false
        }
      });

      if (typeof animation.setSubframe === "function") {
        animation.setSubframe(false);
      }

      animation.addEventListener("DOMLoaded", function() {
        lottieIsReady = true;

        if (typeof animation.goToAndStop === "function") {
          animation.goToAndStop(firstSegment[0], true);
        }

        startIntroWhenReady();
      });

      animation.addEventListener("complete", function() {
        if (phase === "intro") {
          holdIntro();
          return;
        }

        if (phase === "exit") {
          finishReveal();
        }
      });

      animation.addEventListener("data_failed", revealPage);

      if (pageIsLoaded) {
        startIntroWhenReady();
      } else {
        window.addEventListener("load", markPageLoaded, { once: true });
      }
    })();

    (function() {
      var target = new Date("2026-11-20T00:00:00+05:30").getTime();
      var elements = {
        days: document.getElementById("std-days"),
        hours: document.getElementById("std-hours"),
        minutes: document.getElementById("std-minutes"),
        seconds: document.getElementById("std-seconds")
      };

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function updateCountdown() {
        var now = Date.now();
        var distance = target - now;

        if (distance <= 0) {
          elements.days.textContent = "00";
          elements.hours.textContent = "00";
          elements.minutes.textContent = "00";
          elements.seconds.textContent = "00";
          return true;
        }

        elements.days.textContent = pad(Math.floor(distance / 86400000));
        elements.hours.textContent = pad(Math.floor((distance % 86400000) / 3600000));
        elements.minutes.textContent = pad(Math.floor((distance % 3600000) / 60000));
        elements.seconds.textContent = pad(Math.floor((distance % 60000) / 1000));
        return false;
      }

      if (updateCountdown()) return;

      var timer = window.setInterval(function() {
        if (updateCountdown()) {
          window.clearInterval(timer);
        }
      }, 1000);
    })();

    (function() {
      var typewriter = document.getElementById("std-typewriter-text");
      if (!typewriter) return;

      var words = ["finds", "gets","troubles","marries", "keeps"];
      var wordIndex = 0;
      var charIndex = words[0].length;
      var deleting = false;
      var speed = 120;
      var deleteSpeed = 70;
      var waitTime = 2000;
      var initialDelay = 650;

      if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        typewriter.textContent = "marries";
        return;
      }

      typewriter.textContent = words[0];

      function tick() {
        var currentWord = words[wordIndex];

        if (deleting) {
          if (charIndex <= 1) {
            wordIndex = (wordIndex + 1) % words.length;
            currentWord = words[wordIndex];
            typewriter.textContent = currentWord.charAt(0);
            charIndex = 1;
            deleting = false;
            window.setTimeout(tick, speed);
            return;
          }

          typewriter.textContent = currentWord.slice(0, Math.max(charIndex - 1, 0));
          charIndex -= 1;

          window.setTimeout(tick, deleteSpeed);
          return;
        }

        typewriter.textContent = currentWord.slice(0, charIndex + 1);
        charIndex += 1;

        if (charIndex >= currentWord.length) {
          deleting = true;
          window.setTimeout(tick, waitTime);
          return;
        }

        window.setTimeout(tick, speed);
      }

      window.setTimeout(tick, initialDelay);
    })();

    (function() {
      var MUSIC_URL = "../assets/music/Mere Sohneya __ Kabir singh __ Flute cover __ Santosh Naik and Swapnil Sonar.mp3";
      var MUSIC_START_SECONDS = 5;
      var MUSIC_VOLUME = 0.28;
      var MUSIC_FADE_START_VOLUME = 0.04;
      var MUSIC_FADE_DURATION = 5000;
      var backgroundAudio = new Audio(MUSIC_URL);
      var backgroundAudioHasStarted = false;
      var backgroundAudioPlayPending = false;
      var volumeFadeFrame;
      var mediaSessionReady = false;

      backgroundAudio.loop = false;
      backgroundAudio.preload = "auto";
      backgroundAudio.autoplay = false;
      backgroundAudio.muted = false;
      backgroundAudio.volume = MUSIC_FADE_START_VOLUME;

      function seekBackgroundAudioToStart() {
        try {
          if (backgroundAudio.readyState > 0) {
            backgroundAudio.currentTime = MUSIC_START_SECONDS;
          }
        } catch (error) {}
      }

      function cancelVolumeFade() {
        if (!volumeFadeFrame) return;

        window.cancelAnimationFrame(volumeFadeFrame);
        volumeFadeFrame = null;
      }

      function fadeBackgroundAudioVolume() {
        cancelVolumeFade();

        if (!window.requestAnimationFrame) {
          backgroundAudio.volume = MUSIC_VOLUME;
          return;
        }

        var startVolume = Math.max(0, Math.min(MUSIC_VOLUME, backgroundAudio.volume || MUSIC_FADE_START_VOLUME));
        var startTime = window.performance && typeof window.performance.now === "function"
          ? window.performance.now()
          : Date.now();

        function step(timestamp) {
          var now = typeof timestamp === "number" ? timestamp : Date.now();
          var progress = Math.min(Math.max((now - startTime) / MUSIC_FADE_DURATION, 0), 1);
          var easedProgress = 1 - Math.pow(1 - progress, 3);

          backgroundAudio.volume = startVolume + ((MUSIC_VOLUME - startVolume) * easedProgress);

          if (progress < 1 && !backgroundAudio.paused) {
            volumeFadeFrame = window.requestAnimationFrame(step);
            return;
          }

          backgroundAudio.volume = MUSIC_VOLUME;
          volumeFadeFrame = null;
        }

        volumeFadeFrame = window.requestAnimationFrame(step);
      }

      function syncMediaSessionState() {
        if (typeof navigator === "undefined" || !("mediaSession" in navigator)) return;

        try {
          navigator.mediaSession.playbackState = backgroundAudio.paused ? "paused" : "playing";
        } catch (error) {}
      }

      function setMediaActionHandler(action, handler) {
        if (typeof navigator === "undefined" || !("mediaSession" in navigator)) return;
        if (typeof navigator.mediaSession.setActionHandler !== "function") return;

        try {
          navigator.mediaSession.setActionHandler(action, handler);
        } catch (error) {}
      }

      function registerMediaSession() {
        if (typeof navigator === "undefined" || !("mediaSession" in navigator)) return;

        if ("MediaMetadata" in window) {
          try {
            navigator.mediaSession.metadata = new MediaMetadata({
              title: "Mere Sohneya",
              artist: "Santosh Naik and Swapnil Sonar",
              album: "Palak and Shubham"
            });
          } catch (error) {}
        }

        if (!mediaSessionReady) {
          setMediaActionHandler("play", function() {
            startBackgroundAudio();
          });
          setMediaActionHandler("pause", function() {
            pauseBackgroundAudio();
          });
          setMediaActionHandler("stop", function() {
            pauseBackgroundAudio();
            seekBackgroundAudioToStart();
            syncMediaSessionState();
          });
          mediaSessionReady = true;
        }

        syncMediaSessionState();
      }

      function startBackgroundAudio(options) {
        var shouldRestart = options && options.restart === true;
        var forceAudible = options && options.forceAudible === true;
        var fadeIn = options && options.fadeIn === true;

        cancelVolumeFade();

        if (forceAudible) {
          backgroundAudio.muted = false;
        }

        if (backgroundAudioPlayPending) {
          return Promise.resolve();
        }

        if (!backgroundAudio.muted) {
          backgroundAudio.volume = fadeIn ? MUSIC_FADE_START_VOLUME : MUSIC_VOLUME;
        }

        if (shouldRestart || backgroundAudio.currentTime < MUSIC_START_SECONDS) {
          seekBackgroundAudioToStart();
        }

        registerMediaSession();
        backgroundAudioPlayPending = true;

        var playRequest = backgroundAudio.play();

        if (playRequest && typeof playRequest.then === "function") {
          return playRequest.then(function() {
            backgroundAudioHasStarted = true;
            backgroundAudioPlayPending = false;

            if (!backgroundAudio.muted) {
              if (fadeIn) {
                fadeBackgroundAudioVolume();
              } else {
                backgroundAudio.volume = MUSIC_VOLUME;
              }
            }

            syncMediaSessionState();
          }).catch(function(error) {
            backgroundAudioHasStarted = false;
            backgroundAudioPlayPending = false;

            console.warn("Background audio could not start after reveal.", error);
          });
        }

        backgroundAudioHasStarted = true;
        backgroundAudioPlayPending = false;
        if (!backgroundAudio.muted) {
          if (fadeIn) {
            fadeBackgroundAudioVolume();
          } else {
            backgroundAudio.volume = MUSIC_VOLUME;
          }
        }
        syncMediaSessionState();
        return Promise.resolve();
      }

      function pauseBackgroundAudio() {
        cancelVolumeFade();

        if (!backgroundAudio.paused) {
          backgroundAudio.pause();
        }

        syncMediaSessionState();
      }

      function handleRevealDateAudio() {
        startBackgroundAudio({ restart: !backgroundAudioHasStarted, forceAudible: true, fadeIn: true });
      }

      backgroundAudio.addEventListener("loadedmetadata", seekBackgroundAudioToStart);
      backgroundAudio.addEventListener("canplay", function() {
        if (!backgroundAudioHasStarted) {
          seekBackgroundAudioToStart();
        }
      }, { once: true });
      backgroundAudio.addEventListener("play", syncMediaSessionState);
      backgroundAudio.addEventListener("pause", syncMediaSessionState);
      backgroundAudio.addEventListener("ended", function() {
        seekBackgroundAudioToStart();
        startBackgroundAudio();
      });

      registerMediaSession();
      document.addEventListener("std:reveal-date", handleRevealDateAudio);

      try {
        backgroundAudio.load();
      } catch (error) {}

      document.addEventListener("visibilitychange", function() {
        if (document.hidden) {
          pauseBackgroundAudio();
          return;
        }

        if (backgroundAudioHasStarted) {
          startBackgroundAudio();
        }
      });
      window.addEventListener("pagehide", pauseBackgroundAudio);
    })();
  </script>
